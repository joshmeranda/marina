syntax = "proto3";

package terminal;

option go_package = "github.com/joshmeranda/marina/apis/terminal";

import "google/protobuf/empty.proto";

service Terminal {
    rpc CreateTerminal(TerminalCreateRequest) returns (google.protobuf.Empty) {}
}

message TerminalCreateRequest {
    string image = 1;
    string shell = 2;
}
